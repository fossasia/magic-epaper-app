name: Bug report
description: Report a bug to help us improve Magic ePaper
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        Please fill out the details below to help us reproduce and fix the issue faster.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
      placeholder: "Clear, short description of the bug..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots / screen recording
      description: Paste logs or attach screenshots/recordings if available.
      placeholder: "Add any relevant logs or screenshots here..."
    validations:
      required: false

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Android
        - iOS
        - Web
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: App version / commit
      description: If known, share the version, release, or commit hash.
      placeholder: "e.g. v1.2.0 or c92838d"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment (optional)
      description: OS, device model, browser (for web), etc.
      placeholder: "e.g. Windows 11, Chrome 121 / Pixel 6..."
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I can reproduce this issue consistently.
          required: false
