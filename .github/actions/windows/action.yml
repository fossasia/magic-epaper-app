name: "Windows Workflow"

inputs:
  VERSION_NAME:
    description: 'Version Name to be used for build'
    required: false
    default: '1.0.0'
  VERSION_CODE:
    description: 'Version Code to be used for build'
    required: true
    default: '1'

runs:
  using: "composite"
  steps:
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        cache: true
        flutter-version-file: pubspec.yaml

    - name: Fetch Dependencies
      shell: pwsh
      run: flutter pub get

    - name: Build Windows App
      shell: pwsh
      run: |
        flutter config --enable-windows-desktop
        flutter build windows --release --build-name ${{ inputs.VERSION_NAME }} --build-number ${{ inputs.VERSION_CODE }}

    - name: Build iss script
      id: build-iss
      shell: pwsh
      run: |
        # Update version in pubspec.yaml for iss script
        (Get-Content pubspec.yaml) -replace '^version: .*', "version: ${{ inputs.VERSION_NAME }}+${{ inputs.VERSION_CODE }}" | Set-Content pubspec.yaml

       
        dart pub global activate inno_bundle

        dart pub global run inno_bundle:build --no-app --release --no-installer
        echo $(dart pub global run inno_bundle:build --envs --no-hf) | Out-File -FilePath $Env:GITHUB_OUTPUT -Encoding utf8 -Append

    - name: Compile Installer
      shell: pwsh
      run: |
        choco install innosetup --version=6.4.0 -y
        $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\iscc.exe"
        # Remove missing Icelandic language include if present to avoid build failure
        $issPath = "build\windows\x64\installer\Release\inno-script.iss"
        if (Test-Path $issPath) {
          (Get-Content $issPath) | Where-Object { $_ -notmatch 'Icelandic\.isl' } | Set-Content $issPath
        }
        & "$iscc" /O+ "build\windows\x64\installer\Release\inno-script.iss"

    - name: Store Windows Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-artifact
        path: build/windows/x64/installer/Release/*.exe